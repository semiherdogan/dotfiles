font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 14.0
modify_font cell_height 110%
text_composition_strategy 1.7 30
macos_thicken_font 0.2

background #1a1b26
background_image /Users/semih/dotfiles/terminal/bg.jpg
background_image_layout cscaled
background_tint 0.90
# background_blur 50
# background_opacity 0.50

remember_window_size yes
remember_window_position yes
initial_window_width 140c
initial_window_height 30c
window_padding_width 8
enabled_layouts splits
tab_bar_edge bottom
tab_bar_style powerline
tab_bar_min_tabs 2

macos_option_as_alt no
macos_quit_when_last_window_closed yes
hide_window_decorations titlebar-only

map alt+left send_text all \x1b\x62
map alt+right send_text all \x1b\x66
map cmd+enter toggle_fullscreen
map alt+enter toggle_fullscreen
map cmd+t new_tab
map cmd+w close_tab
map cmd+d launch --location=vsplit
map cmd+shift+d launch --location=hsplit
map cmd+shift+h neighboring_window left
map cmd+shift+j neighboring_window down
map cmd+shift+k neighboring_window up
map cmd+shift+l neighboring_window right
map cmd+left send_text all \x01
map cmd+right send_text all \x05
map alt+backspace send_text all \x17
map cmd+backspace send_text all \x15
map cmd+k clear_terminal to_cursor active

copy_on_select clipboard
scrollback_lines 1000000
enable_audio_bell no
url_style single
detect_urls yes

cursor_shape block
cursor_blink_interval 0
mouse_hide_wait 3.0

confirm_os_window_close 0
update_check_interval 0
shell_integration enabled
