"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
palette = "kanagawa_wave"

format = """
[â–‘â–’â–“](color_wave_blue)\
$os\
[î‚°](bg:color_cyan fg:color_wave_blue)\
$directory\
[î‚°](fg:color_cyan)\
$git_branch\
$git_status\
$fill\
$line_break$character"""

right_format = """
$nodejs$golang$rust$php$python$cmd_duration"""

[palettes.kanagawa_wave]
color_fg0 = "#DCD7BA"
color_fg1 = "#C8C093"
color_bg0 = "#16161D"
color_bg1 = "#1F1F28"
color_bg2 = "#2A2A37"
color_bg3 = "#54546D"
color_red = "#C34043"
color_green = "#76946A"
color_yellow = "#C0A36E"
color_blue = "#7E9CD8"
color_purple = "#957FB8"
color_cyan = "#6A9589"
color_orange = "#FFA066"
color_bright_red = "#E82424"
color_bright_green = "#98BB6C"
color_bright_yellow = "#E6C384"
color_bright_blue = "#7FB4CA"
color_bright_purple = "#938AA9"
color_bright_cyan = "#7AA89F"
color_git_add = "#76946A"
color_git_change = "#DCA561"
color_git_delete = "#C34043"
color_comment = "#727169"
color_wave_blue = "#2D4F67"

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[kubernetes]
disabled = true

[os]
disabled = false
format = "[ $symbol ]($style)"
style = "bg:color_wave_blue fg:color_fg0"

[os.symbols]
Macos = "َ°€µ"
Linux = "َ°Œ½"
Ubuntu = "َ°•ˆ"
Debian = "َ°£ڑ"
Arch = "َ°£‡"
Fedora = "َ°£›"
Windows = "َ°چ²"

[directory]
format = "[ $path ]($style)[$read_only]($read_only_style)"
style = "bg:color_cyan fg:color_fg0"
read_only = " َ°Œ¾"
read_only_style = "bg:color_cyan fg:color_bright_red"
truncation_length = 3
truncation_symbol = "â€¦/"
truncate_to_repo = false

[git_branch]
format = "[ $symbol$branch(:$remote_branch) ]($style)"
style = "fg:color_orange"
symbol = "َ°ک¬ "
truncation_length = 30

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "fg:color_git_change"
conflicted = "َ°½ھ $count "
ahead = "â‡، $count "
behind = "â‡£ $count "
diverged = "â‡• $count "
untracked = "َ°…— $count "
stashed = "َ°ک· $count "
modified = "î«‍ $count "
staged = "ïپ§ $count "
renamed = "ï‘ڑ $count "
deleted = "َ°ڑƒ $count "

[nodejs]
format = "[ $symbol($version) ]($style)"
style = "fg:color_green"
symbol = "node "

[golang]
format = "[ $symbol($version) ]($style)"
style = "fg:color_cyan"
symbol = "go "

[rust]
format = "[ $symbol($version) ]($style)"
style = "fg:color_orange"
symbol = "rust "

[php]
format = "[ $symbol($version) ]($style)"
style = "fg:color_purple"
symbol = "php "

[python]
format = "[ $symbol$pyenv_prefix($version)( $virtualenv) ]($style)"
style = "fg:color_yellow"
symbol = "py "

[cmd_duration]
format = "[ $duration ]($style)"
min_time = 1000
style = "fg:color_comment"

[fill]
symbol = " "

[character]
success_symbol = "[â‌¯](bold fg:color_green)"
error_symbol = "[â‌¯](bold fg:color_red)"
vimcmd_symbol = "[â‌®](bold fg:color_green)"
vimcmd_visual_symbol = "[â‌®](bold fg:color_yellow)"
vimcmd_replace_symbol = "[â‌®](bold fg:color_purple)"
vimcmd_replace_one_symbol = "[â‌®](bold fg:color_purple)"
